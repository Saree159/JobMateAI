name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: hirematrix-rg
  ACR_NAME: hirematrixacr
  BACKEND_APP: hirematrix-backend
  SWA_NAME: hirematrix-frontend

jobs:
  # ─── Backend: build + push to ACR, update Container App ──────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    outputs:
      backend-url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push backend image via ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image hirematrix-backend:${{ github.sha }} \
            --image hirematrix-backend:latest \
            --file backend/Dockerfile \
            backend/

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/hirematrix-backend:${{ github.sha }}

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  # ─── Frontend: build with Vite, deploy to Static Web Apps ────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://${{ needs.deploy-backend.outputs.backend-url }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          output_location: "dist"
          skip_app_build: true   # we built above so VITE_API_URL is baked in
