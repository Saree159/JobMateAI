name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  RESOURCE_GROUP: hirematrix-rg
  ACR_NAME: hirematrixacrc4b90a
  BACKEND_APP: hirematrix-backend

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: az account set --subscription b8ac3384-853d-4cf8-bd8e-3f9f6959aad0

      - name: Build & push backend image via ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image hirematrix-backend:${{ github.sha }} \
            --image hirematrix-backend:latest \
            --file backend/Dockerfile \
            backend/

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/hirematrix-backend:${{ github.sha }}
